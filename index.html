<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumis Cyber-Dragon Legacy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        :root { --gold: #f3ba2f; --neon: #00f2ff; --bg: #0b0e11; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }

        /* HEADER */
        .header { height: 70px; background: #181a20; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .stat-val { font-family: 'Orbitron'; color: var(--gold); font-size: 0.9rem; }
        .stat-label { font-size: 0.5rem; color: #888; text-transform: uppercase; }

        .container { position: absolute; inset: 70px 0 85px 0; overflow-y: auto; padding: 15px; }
        .screen { display: none; }
        .active-screen { display: block; }

        /* FACTORY (Нова механіка) */
        .cyber-box { 
            width: 120px; height: 120px; margin: 10px auto; background: radial-gradient(circle, var(--gold) 0%, transparent 75%);
            border: 2px solid var(--gold); border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; cursor: pointer;
        }
        .en-bar { width: 140px; height: 6px; background: #222; margin: 8px auto; border-radius: 3px; border: 1px solid var(--neon); overflow: hidden; }
        .en-fill { height: 100%; background: var(--neon); width: 100%; transition: 0.3s; }
        .factory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 15px; }
        .slot { aspect-ratio: 1; background: #181a20; border: 1px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; font-size: 1.5rem; }
        .slot.occupied { border-color: var(--gold); }
        .slot.selected { border-color: var(--neon); background: rgba(0,242,255,0.05); }
        .lvl-badge { position: absolute; bottom: 2px; right: 2px; font-size: 0.5rem; color: var(--gold); background: #000; padding: 1px 3px; border-radius: 3px; }

        /* Елементи списків */
        .item-card { background: var(--card); border: 1px solid #333; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-action { background: var(--gold); color: black; border: none; padding: 8px 12px; border-radius: 6px; font-family: 'Orbitron'; font-weight: bold; font-size: 0.7rem; cursor: pointer; }

        /* Навігація */
        .nav { height: 85px; background: #181a20; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--gold); }
        .nav-item { text-align: center; color: #555; font-size: 0.55rem; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat-box"><span class="stat-label">Power</span><br><span id="hp-val" class="stat-val">⚡ 0.00</span></div>
        <div class="stat-box" style="text-align:right"><span class="stat-label">Lumis Vault</span><br><span id="bal-val" class="stat-val">0.000</span></div>
    </div>

    <div class="container">
        <div id="scr-factory" class="screen active-screen">
            <div style="text-align:center">
                <div class="cyber-box" onclick="spawnUnit()">📦</div>
                <div class="en-bar"><div id="en-fill" class="en-fill"></div></div>
                <div id="en-text" style="font-size:0.6rem; color:#888;">ENERGY: 100/100</div>
            </div>
            <div class="factory-grid" id="grid"></div>
        </div>

        <div id="scr-tasks" class="screen">
            <h3 style="margin-bottom:15px; color:var(--neon); font-size:0.9rem;">TASKS</h3>
            <div id="tasks-list"></div>
        </div>

        <div id="scr-nodes" class="screen">
            <h3 style="margin-bottom:15px; color:var(--neon); font-size:0.9rem;">NODES</h3>
            <div id="nodes-list"></div>
        </div>

        <div id="scr-friends" class="screen">
            <h3 style="margin-bottom:15px; color:var(--neon); font-size:0.9rem;">FRIENDS</h3>
            <div class="item-card" style="flex-direction:column; align-items:flex-start;">
                <p style="font-size:0.7rem; margin-bottom:10px;">Invite friends to get 10% bonus!</p>
                <code style="background:#000; padding:8px; width:100%; font-size:0.6rem; border-radius:5px;">https://t.me/lumis_bot?start=user</code>
            </div>
        </div>

        <div id="scr-wallet" class="screen">
            <h3 style="margin-bottom:15px; color:var(--neon); font-size:0.9rem;">WALLET</h3>
            <div style="background:var(--card); padding:20px; border-radius:15px; text-align:center;">
                <div id="w-bal" style="font-size:1.8rem; color:var(--gold); font-family:'Orbitron';">0.000</div>
                <button class="btn-action" style="width:100%; margin-top:15px; padding:12px;">CONNECT WALLET</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="nav('scr-factory', this)"><i>⚙️</i>FACTORY</div>
        <div class="nav-item" onclick="nav('scr-tasks', this)"><i>📋</i>TASKS</div>
        <div class="nav-item" onclick="nav('scr-nodes', this)"><i>⚡</i>NODES</div>
        <div class="nav-item" onclick="nav('scr-friends', this)"><i>👥</i>FRIENDS</div>
        <div class="nav-item" onclick="nav('scr-wallet', this)"><i>👛</i>WALLET</div>
    </nav>

    <script>
        const icons = ["🔌", "🤖", "🦾", "🛡️", "🚀", "🛰️", "⚡", "💠", "⚛️", "🧬", "🔮", "🌌"];
        let state = {
            lumis: parseFloat(localStorage.getItem('L_BAL')) || 0.1,
            hp: 0,
            energy: 100,
            grid: JSON.parse(localStorage.getItem('L_GRID')) || Array(16).fill(null),
            nodeIncome: parseFloat(localStorage.getItem('L_NODE')) || 0
        };

        let selected = null;

        // ЗАВАНТАЖЕННЯ ДАНИХ (TASKS ТА NODES З ТВОГО JSON)
        async function loadData() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                
                if(data.tasks) {
                    const tList = document.getElementById('tasks-list');
                    tList.innerHTML = '';
                    data.tasks.forEach(t => {
                        tList.innerHTML += `<div class="item-card"><div><b>${t.title}</b><br><small>+${t.reward} LC</small></div><button class="btn-action" onclick="addMoney(${t.reward})">GO</button></div>`;
                    });
                }
                
                if(data.hardware_nodes) {
                    const nList = document.getElementById('nodes-list');
                    nList.innerHTML = '';
                    data.hardware_nodes.forEach(n => {
                        nList.innerHTML += `<div class="item-card"><div><b>${n.icon} ${n.name}</b><br><small>+${n.income} HP/H</small></div><button class="btn-action" onclick="buyNode(${n.cost}, ${n.income})">${n.cost} LC</button></div>`;
                    });
                }
            } catch(e) { console.log("Waiting for data.json..."); }
        }

        function updateUI() {
            document.getElementById('bal-val').innerText = state.lumis.toFixed(3);
            document.getElementById('w-bal').innerText = state.lumis.toFixed(3);
            document.getElementById('hp-val').innerText = `⚡ ${state.hp.toFixed(2)}`;
            document.getElementById('en-fill').style.width = state.energy + '%';
            document.getElementById('en-text').innerText = `ENERGY: ${Math.floor(state.energy)}/100`;
            localStorage.setItem('L_BAL', state.lumis);
            localStorage.setItem('L_GRID', JSON.stringify(state.grid));
            localStorage.setItem('L_NODE', state.nodeIncome);
        }

        function spawnUnit() {
            const free = state.grid.indexOf(null);
            if(state.energy >= 10 && free !== -1) {
                state.energy -= 10; state.grid[free] = 1;
                recalc(); renderGrid(); updateUI();
            }
        }

        function renderGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            state.grid.forEach((lvl, i) => {
                const s = document.createElement('div');
                s.className = `slot ${lvl?'occupied':''} ${selected===i?'selected':''}`;
                s.onclick = () => {
                    if(selected===null) { if(state.grid[i]) selected=i; }
                    else {
                        if(i!==selected && state.grid[i]===state.grid[selected] && state.grid[i]) {
                            state.grid[i]++; state.grid[selected]=null; selected=null;
                        } else { selected=state.grid[i]?i:null; }
                    }
                    recalc(); renderGrid(); updateUI();
                };
                if(lvl) s.innerHTML = `${icons[(lvl-1)%icons.length]}<span class="lvl-badge">L${lvl}</span>`;
                g.appendChild(s);
            });
        }

        function buyNode(cost, inc) {
            if(state.lumis >= cost) {
                state.lumis -= cost; state.nodeIncome += inc; recalc(); updateUI();
            }
        }

        function addMoney(val) { state.lumis += val; updateUI(); alert("Reward added!"); }

        function recalc() {
            let total = state.nodeIncome;
            state.grid.forEach(lvl => { if(lvl) total += 0.05 * Math.pow(2.2, lvl-1); });
            state.hp = total;
        }

        function nav(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen');
            el.classList.add('active');
        }

        setInterval(() => {
            if(state.hp > 0) state.lumis += (state.hp / 3600);
            if(state.energy < 100) state.energy += 0.4;
            updateUI();
        }, 1000);

        loadData(); recalc(); renderGrid(); updateUI();
    </script>
</body>
</html>
