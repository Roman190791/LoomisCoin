<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumis: Lab Awakening</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --ai-purple: #bc00ff;
            --klyn-gold: #ffcc00;
            --lab-bg: #0a0c10;
        }
        body { font-family: 'Courier New', monospace; background-color: var(--lab-bg); color: white; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Лабораторний фон з ефектом сітки */
        .lab-container {
            flex: 1;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.8); border-bottom: 1px solid var(--ai-purple); text-align: center; z-index: 10; }
        
        /* Камера інкубації */
        .incubation-chamber {
            width: 220px;
            height: 280px;
            margin-top: 40px;
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 110px 110px 20px 20px;
            position: relative;
            background: rgba(0, 242, 255, 0.02);
            box-shadow: inset 0 0 50px rgba(0, 242, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        /* Ефект "рідини" або пари в камері */
        .liquid {
            position: absolute;
            bottom: 0; width: 100%; height: 20%;
            background: var(--neon-blue);
            opacity: 0.2;
            filter: blur(20px);
            animation: wave 3s infinite ease-in-out;
        }

        /* Люміс, що оживає */
        #lumis-avatar {
            font-size: 80px;
            filter: drop-shadow(0 0 20px var(--neon-blue));
            transition: all 0.5s ease;
            z-index: 5;
            user-select: none;
        }

        .pulse { animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 30px var(--neon-blue)); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes wave {
            0%, 100% { height: 15%; }
            50% { height: 25%; }
        }

        /* Кнопки та інтерфейс */
        .nav-bar { display: flex; background: #000; padding: 12px 0; border-top: 1px solid #222; width: 100%; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: #444; cursor: pointer; }
        .nav-item.active-nav { color: var(--neon-blue); }

        .stats-overlay { position: absolute; bottom: 20px; left: 20px; font-size: 10px; color: var(--neon-blue); text-align: left; }
        
        .click-hint { position: absolute; top: 10px; font-size: 10px; color: #444; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .page { display: none; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: center; }
        .active { display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 10px; color: #888; margin-bottom: 5px;">ОБ'ЄКТ: LUMIS | СТАТУС: <span id="status-name" style="color: var(--neon-blue);">ІНКУБАЦІЯ</span></div>
        <div id="lumis-balance" style="font-size: 22px; font-weight: bold; color: var(--neon-blue);">0.00 L</div>
        <div id="klyn-balance" style="font-size: 14px; color: var(--klyn-gold);">0 KLYN ENERGY</div>
    </div>

    <div class="lab-container">
        <div id="mining" class="page active">
            <div class="click-hint">НАТИСНІТЬ ДЛЯ СИНХРОНІЗАЦІЇ</div>
            <div class="incubation-chamber" onclick="clickMine(event)">
                <div class="liquid"></div>
                <div id="lumis-avatar" class="pulse">🧪</div>
            </div>
            
            <div class="stats-overlay">
                РІВЕНЬ ЗЛИТТЯ: <span id="level-num">1</span><br>
                ПОТУЖНІСТЬ: +<span id="rate">1</span>/с
            </div>

            <button onclick="exchangeCurrency()" style="margin-top: 30px; background: transparent; border: 1px solid var(--klyn-gold); color: var(--klyn-gold); padding: 12px 20px; font-family: inherit; cursor: pointer;">
                СИНТЕЗУВАТИ LUMIS (1000 KLYN)
            </button>
        </div>

        <div id="shop" class="page">
            <h2 style="color: var(--neon-blue);">ЛАБОРАТОРНІ МОДУЛІ</h2>
            <div style="background: #111; padding: 15px; border-radius: 8px; margin-bottom: 10px; width: 100%; border-left: 3px solid var(--ai-purple); display: flex; justify-content: space-between; align-items: center;">
                <div style="text-align: left;"><strong>Нейро-ін'єкція</strong><br><small>+1 до видобутку</small></div>
                <button onclick="buyUpgrade(0.5, 1)" style="background: var(--neon-blue); border: none; padding: 8px; border-radius: 4px; font-weight: bold;">0.5 L</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-nav" onclick="showPage('mining', this)">ЛАБОРАТОРІЯ</div>
        <div class="nav-item" onclick="showPage('shop', this)">МОДУЛІ</div>
    </div>

    <script>
        let klyn = parseFloat(localStorage.getItem('klyn')) || 0;
        let lumis = parseFloat(localStorage.getItem('lumis')) || 0;
        let rate = parseInt(localStorage.getItem('rate')) || 1;
        let totalMined = parseFloat(localStorage.getItem('totalMined')) || 0;

        // Етапи еволюції Люміса
        const evolution = [
            { level: 1, icon: '🧪', name: 'ІНКУБАЦІЯ', color: '#00f2ff' },
            { level: 2, icon: '🧬', name: 'ГЕНЕЗИС', color: '#bc00ff' },
            { level: 3, icon: '🧠', name: 'НЕЙРО-МЕРЕЖА', color: '#00ff88' },
            { level: 4, icon: '👤', name: 'АНДРОЇД', color: '#ff0055' },
            { level: 5, icon: '⚡', name: 'ГІБРИД', color: '#ffff00' },
            { level: 6, icon: '🛡️', name: 'ГЕРОЙ', color: '#ffffff' }
        ];

        function updateUI() {
            document.getElementById('klyn-balance').innerText = Math.floor(klyn) + " KLYN ENERGY";
            document.getElementById('lumis-balance').innerText = lumis.toFixed(2) + " L";
            document.getElementById('rate').innerText = rate;

            let currentLevel = Math.min(Math.floor(totalMined / 1000) + 1, 6);
            let stage = evolution[currentLevel - 1];

            document.getElementById('level-num').innerText = currentLevel;
            document.getElementById('status-name').innerText = stage.name;
            document.getElementById('status-name').style.color = stage.color;
            
            let avatar = document.getElementById('lumis-avatar');
            avatar.innerText = stage.icon;
            avatar.style.filter = `drop-shadow(0 0 20px ${stage.color})`;
            
            localStorage.setItem('klyn', klyn);
            localStorage.setItem('lumis', lumis);
            localStorage.setItem('rate', rate);
            localStorage.setItem('totalMined', totalMined);
        }

        function clickMine(event) {
            klyn += 1;
            totalMined += 1;
            
            // Ефект частинок
            let particle = document.createElement('div');
            particle.innerText = '+1';
            particle.style.position = 'absolute';
            particle.style.left = event.clientX + 'px';
            particle.style.top = event.clientY + 'px';
            particle.style.color = 'var(--neon-blue)';
            particle.style.pointerEvents = 'none';
            particle.animate([
                { transform: 'translateY(0)', opacity: 1 },
                { transform: 'translateY(-50px)', opacity: 0 }
            ], { duration: 600 });
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 600);

            updateUI();
        }

        function exchangeCurrency() {
            if (klyn >= 1000) {
                klyn -= 1000;
                lumis += 0.10;
                updateUI();
            }
        }

        function buyUpgrade(cost, addRate) {
            if (lumis >= cost) {
                lumis -= cost;
                rate += addRate;
                updateUI();
            }
        }

        function showPage(pageId, navEl) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(pageId).classList.add('active');
            navEl.classList.add('active-nav');
        }

        setInterval(() => {
            klyn += rate;
            totalMined += rate;
            updateUI();
        }, 1000);

        updateUI();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
