<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumis Cyber-Dragon | Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        :root { --gold: #f3ba2f; --neon: #00f2ff; --bg: #0b0e11; --card: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }

        /* Верхня панель */
        .top-panel { height: 75px; background: #181a20; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; position: relative; z-index: 100; }
        .stat-val { font-family: 'Orbitron'; color: var(--gold); font-size: 0.9rem; }
        .stat-label { font-size: 0.5rem; color: #888; text-transform: uppercase; }

        .screen { display: none; position: absolute; inset: 75px 0 85px 0; padding: 15px; overflow-y: auto; }
        .active-screen { display: block; }

        /* Генератор та Енергія */
        .gen-area { text-align: center; margin: 15px 0; position: relative; }
        .cyber-box { 
            width: 130px; height: 130px; margin: 0 auto; background: radial-gradient(circle, var(--gold) 0%, transparent 75%);
            border: 2px solid var(--gold); border-radius: 25px; display: flex; align-items: center; justify-content: center;
            font-size: 4rem; cursor: pointer; transition: 0.1s; box-shadow: 0 0 20px rgba(243,186,47,0.1);
        }
        .cyber-box:active { transform: scale(0.92); }
        .energy-bar-bg { width: 140px; height: 6px; background: #222; margin: 10px auto; border-radius: 3px; overflow: hidden; border: 1px solid var(--neon); }
        .energy-fill { height: 100%; background: var(--neon); width: 100%; transition: 0.3s; box-shadow: 0 0 10px var(--neon); }

        /* Сітка 4х4 */
        .factory-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; 
            background: rgba(255,255,255,0.02); border-radius: 15px; border: 1px solid #333; 
        }
        .slot { 
            aspect-ratio: 1; background: #181a20; border: 1px solid #2a2d33; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; position: relative; font-size: 1.8rem;
        }
        .slot.occupied { border-color: var(--gold); background: rgba(243,186,47,0.02); }
        .slot.selected { border-color: var(--neon); background: rgba(0,242,255,0.05); }
        .lvl-tag { position: absolute; bottom: 4px; right: 4px; font-size: 0.55rem; color: var(--gold); background: #000; padding: 1px 4px; border-radius: 4px; font-weight: bold; }

        /* Магазин */
        .shop-item { background: var(--card); border: 1px solid #333; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--gold); color: black; border: none; padding: 10px 15px; border-radius: 8px; font-family: 'Orbitron'; font-weight: bold; font-size: 0.7rem; }
        .buy-btn:disabled { opacity: 0.2; }

        /* Навігація */
        .nav { height: 85px; background: #181a20; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--gold); }
        .nav-btn { text-align: center; color: #555; font-size: 0.6rem; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn i { font-size: 1.6rem; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="top-panel">
        <div>
            <div class="stat-label">Production Speed</div>
            <div id="hp-display" class="stat-val">⚡ 0.00000 H/H</div>
        </div>
        <div style="text-align:right">
            <div class="stat-label">Lumis Vault</div>
            <div id="lumis-display" class="stat-val">0.00000</div>
        </div>
    </div>

    <div id="scr-factory" class="screen active-screen">
        <div class="gen-area">
            <div class="cyber-box" onclick="spawnFromBox()">📦</div>
            <div class="energy-bar-bg"><div id="en-fill" class="energy-fill"></div></div>
            <div id="en-text" style="font-size:0.6rem; color:#888;">ENERGY: 100/100</div>
        </div>
        <div class="factory-grid" id="main-grid"></div>
        <div style="text-align:center; margin-top:15px; font-size:0.5rem; color:#444; letter-spacing:1px;">MERGE UNITS TO UNLOCK HIGHER LEVELS</div>
    </div>

    <div id="scr-market" class="screen">
        <h3 style="color:var(--neon); font-family:'Orbitron'; font-size:0.8rem; margin-bottom:15px;">CYBER MARKET (L1-L5)</h3>
        <div id="market-container"></div>
    </div>

    <div id="scr-nodes" class="screen">
        <h3 style="color:var(--neon); font-family:'Orbitron'; font-size:0.8rem; margin-bottom:15px;">HARDWARE NODES</h3>
        <div id="nodes-container"></div>
    </div>

    <nav class="nav">
        <div class="nav-btn active" onclick="tab('scr-factory', this)"><i>⚙️</i>FACTORY</div>
        <div class="nav-btn" onclick="tab('scr-market', this)"><i>🛒</i>MARKET</div>
        <div class="nav-btn" onclick="tab('scr-nodes', this)"><i>⚡</i>NODES</div>
    </nav>

    <script>
        // Конфігурація іконок
        const icons = ["🔌", "🤖", "🦾", "🛡️", "🚀", "🛰️", "⚡", "💠", "⚛️", "🧬", "🔮", "🌌", "🧠", "🔥", "💎", "👑"];
        
        let state = {
            lumis: parseFloat(localStorage.getItem('L_BAL')) || 0.1,
            hp: 0,
            energy: 100,
            grid: JSON.parse(localStorage.getItem('L_GRID')) || Array(16).fill(null),
            marketData: []
        };

        let selectedIdx = null;

        // Завантаження JSON
        async function initData() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                state.marketData = data.cyber_market;
                renderMarket();
                renderNodes(data.hardware_nodes);
            } catch(e) { console.log("JSON not loaded, using defaults"); }
        }

        function updateUI() {
            document.getElementById('lumis-display').innerText = state.lumis.toFixed(5);
            document.getElementById('hp-display').innerText = `⚡ ${state.hp.toFixed(5)} H/H`;
            document.getElementById('en-fill').style.width = state.energy + '%';
            document.getElementById('en-text').innerText = `ENERGY: ${Math.floor(state.energy)}/100`;
            
            localStorage.setItem('L_BAL', state.lumis);
            localStorage.setItem('L_GRID', JSON.stringify(state.grid));
        }

        function spawnFromBox() {
            const free = state.grid.indexOf(null);
            if(state.energy >= 10 && free !== -1) {
                state.energy -= 10;
                state.grid[free] = 1;
                recalculate(); renderGrid(); updateUI();
            }
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            state.grid.forEach((lvl, i) => {
                const cell = document.createElement('div');
                cell.className = `slot ${lvl ? 'occupied' : ''} ${selectedIdx === i ? 'selected' : ''}`;
                cell.onclick = () => handleMerge(i);
                if(lvl) cell.innerHTML = `${icons[(lvl-1)%icons.length]} <span class="lvl-tag">L${lvl}</span>`;
                grid.appendChild(cell);
            });
        }

        function handleMerge(i) {
            if(selectedIdx === null) {
                if(state.grid[i]) selectedIdx = i;
            } else {
                if(i !== selectedIdx && state.grid[i] === state.grid[selectedIdx] && state.grid[i]) {
                    state.grid[i]++;
                    state.grid[selectedIdx] = null;
                    selectedIdx = null;
                    recalculate();
                } else {
                    selectedIdx = state.grid[i] ? i : null;
                }
            }
            renderGrid(); updateUI();
        }

        function renderMarket() {
            const cont = document.getElementById('market-container');
            cont.innerHTML = '';
            state.marketData.forEach(item => {
                cont.innerHTML += `
                    <div class="shop-item">
                        <div style="font-size:1.5rem;">${item.icon}</div>
                        <div style="flex:1; margin-left:15px;"><b>${item.name}</b><br><small>+${item.income} H/H</small></div>
                        <button class="buy-btn" onclick="buyUnit(${item.lvl}, ${item.cost})" ${state.lumis < item.cost ? 'disabled' : ''}>${item.cost} LC</button>
                    </div>`;
            });
        }

        function buyUnit(lvl, cost) {
            const free = state.grid.indexOf(null);
            if(state.lumis >= cost && free !== -1) {
                state.lumis -= cost; state.grid[free] = lvl;
                recalculate(); renderGrid(); renderMarket(); updateUI();
            }
        }

        function recalculate() {
            let total = 0;
            state.grid.forEach(lvl => { if(lvl) total += 0.05 * Math.pow(2.2, lvl-1); });
            state.hp = total;
        }

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen');
            el.classList.add('active');
            if(id === 'scr-market') renderMarket();
        }

        // Цикл нарахування
        setInterval(() => {
            if(state.hp > 0) state.lumis += (state.hp / 3600);
            if(state.energy < 100) state.energy += 0.5;
            updateUI();
        }, 1000);

        initData();
        recalculate();
        renderGrid();
        updateUI();
    </script>
</body>
</html>
