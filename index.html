<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumis Dynamic</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --dark: #050505; --card-bg: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; background: #000; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        #top-l { color: var(--neon); font-size: 18px; font-weight: bold; }
        #top-k { color: var(--gold); font-size: 14px; font-weight: bold; }
        .income-info { font-size: 10px; color: var(--neon); opacity: 0.8; }
        .content { flex: 1; display: flex; position: relative; overflow-y: auto; }
        .page { display: none; flex: 1; padding: 20px; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .active-page { display: flex; }
        .main-coin { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #222 0%, #000 100%); border: 4px solid var(--neon); box-shadow: 0 0 25px rgba(0, 242, 255, 0.3); display: flex; align-items: center; justify-content: center; font-size: 70px; cursor: pointer; transition: transform 0.05s; margin: 30px 0; user-select: none; }
        .main-coin:active { transform: scale(0.95); }
        .main-coin::after { content: "L"; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .card { background: var(--card-bg); border: 1px solid #222; padding: 15px; border-radius: 12px; width: 100%; margin: 8px 0; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; }
        .farm-info { text-align: left; }
        .farm-info strong { color: var(--neon); display: block; margin-bottom: 4px; }
        .farm-info small { color: #888; }
        .btn-buy { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; text-decoration: none; text-align: center; }
        .btn-sync { background: none; border: 2px solid var(--gold); color: var(--gold); width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .nav { display: flex; background: #000; border-top: 1px solid #222; padding: 10px 0 25px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: #444; cursor: pointer; }
        .nav-item.active { color: var(--neon); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
        .tap-anim { position: absolute; color: var(--neon); font-weight: bold; animation: fly 0.6s forwards; pointer-events: none; }
        @keyframes fly { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats">
            <div id="top-l">0.00 LUMIS</div>
            <div id="top-k">0 KLYN</div>
            <div class="income-info">ПРИБУТОК: +<span id="income-rate">0</span>/SEC</div>
        </div>
        <div style="font-size: 10px; text-align: right; color: var(--neon);">RANK: HYBRID</div>
    </div>

    <div class="content">
        <div id="p-game" class="page active-page">
            <div class="main-coin" onclick="handleTap(event)"></div>
            <button class="btn-sync" onclick="syncLumis()">СИНТЕЗ (1000 KLYN ➔ 0.1 L)</button>
        </div>

        <div id="p-farms" class="page">
            <h2 style="color:var(--neon)">AI ФЕРМИ</h2>
            <div id="farms-list" style="width: 100%;"></div>
        </div>

        <div id="p-tasks" class="page">
            <h2 style="color:var(--neon)">КВЕСТИ</h2>
            <div id="tasks-list" style="width: 100%;"></div>
        </div>

        <div id="p-acc" class="page">
            <h2 style="color:var(--neon)">ПРОФІЛЬ</h2>
            <div class="card"><span>KLYN Баланс:</span><b id="p-k">0</b></div>
            <div class="card"><span>LUMIS Баланс:</span><b id="p-l">0.00</b></div>
            <div class="card"><span>Швидкість:</span><b style="color: var(--neon);">+<span id="p-r">0</span>/с</b></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('p-game', this)"><span class="nav-icon">🎮</span>СИНТЕЗ</div>
        <div class="nav-item" onclick="switchTab('p-farms', this)"><span class="nav-icon">⛏</span>ФЕРМИ</div>
        <div class="nav-item" onclick="switchTab('p-tasks', this)"><span class="nav-icon">📋</span>КВЕСТИ</div>
        <div class="nav-item" onclick="switchTab('p-acc', this)"><span class="nav-icon">👤</span>ПРОФІЛЬ</div>
    </div>

    <script>
        let k = parseFloat(localStorage.getItem('lm_k_dyn')) || 0;
        let l = parseFloat(localStorage.getItem('lm_l_dyn')) || 0;
        let r = parseInt(localStorage.getItem('lm_r_dyn')) || 0;

        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                // Рендеримо Ферми
                const fList = document.getElementById('farms-list');
                fList.innerHTML = '';
                data.farms.forEach(f => {
                    fList.innerHTML += `<div class="card"><div class="farm-info"><strong>${f.name}</strong><small>${f.desc}</small></div><button class="btn-buy" onclick="buyFarm(${f.price}, ${f.add})">${f.price} L</button></div>`;
                });

                // Рендеримо Квести
                const tList = document.getElementById('tasks-list');
                tList.innerHTML = '';
                data.tasks.forEach(t => {
                    tList.innerHTML += `<div class="card"><div class="farm-info"><strong>${t.name}</strong><small>+${t.reward} KLYN</small></div><a href="${t.url}" target="_blank" class="btn-buy" style="border-color:var(--neon); color:var(--neon);">GO</a></div>`;
                });
            } catch (e) { console.error("Помилка завантаження JSON", e); }
        }

        function refresh() {
            document.getElementById('top-k').innerText = Math.floor(k) + " KLYN";
            document.getElementById('top-l').innerText = l.toFixed(2) + " LUMIS";
            document.getElementById('income-rate').innerText = r;
            document.getElementById('p-k').innerText = Math.floor(k);
            document.getElementById('p-l').innerText = l.toFixed(2);
            document.getElementById('p-r').innerText = r;
            localStorage.setItem('lm_k_dyn', k);
            localStorage.setItem('lm_l_dyn', l);
            localStorage.setItem('lm_r_dyn', r);
        }

        function handleTap(e) {
            k += 1;
            let d = document.createElement('div');
            d.className = 'tap-anim';
            d.innerText = '+1';
            d.style.left = e.clientX + 'px'; d.style.top = e.clientY + 'px';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 600);
            refresh();
        }

        function buyFarm(price, add) {
            if (l >= price) { l -= price; r += add; refresh(); }
            else { alert("Мало LUMIS!"); }
        }

        function syncLumis() {
            if (k >= 1000) { k -= 1000; l += 0.1; refresh(); }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            el.classList.add('active');
        }

        setInterval(() => { if(r > 0) { k += r; refresh(); } }, 1000);
        
        loadData();
        refresh();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
