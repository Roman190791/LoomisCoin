<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumis Terminal | Cyber P2E</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        :root { --gold: #f3ba2f; --neon-blue: #00f2ff; --bg: #0b0e11; --card: rgba(255, 255, 255, 0.05); --green: #00ff88; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }
        
        #boot-screen { position: fixed; inset: 0; background: black; z-index: 10000; display: flex; flex-direction: column; justify-content: center; padding: 30px; color: var(--green); font-size: 0.8rem; }
        .top-panel { height: 80px; background: #181a20; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .hp-counter { color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.75rem; }
        
        .screen { display: none; position: absolute; inset: 80px 0 85px 0; padding: 20px; overflow-y: auto; background: radial-gradient(circle at center, #161a1e 0%, #0b0e11 100%); }
        .active-screen { display: block; animation: scanline 0.2s linear; }
        
        .bal-val { font-family: 'Orbitron'; font-size: 2rem; color: var(--gold); }
        .lumis-core { width: 220px; height: 220px; margin: 20px auto; position: relative; border-radius: 50%; background: radial-gradient(circle, #f3ba2f 0%, #000 70%); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(243, 186, 47, 0.2); cursor: pointer; transition: 0.05s; }
        .lumis-core:active { transform: scale(0.95) skewX(2deg); }
        
        .cyber-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .btn-cyber { background: var(--gold); color: black; border: none; padding: 10px 15px; border-radius: 8px; font-family: 'Orbitron'; font-weight: bold; font-size: 0.7rem; cursor: pointer; }
        
        .nav { height: 85px; background: #181a20; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--gold); }
        .nav-item { text-align: center; color: #555; font-size: 0.6rem; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 1.6rem; display: block; margin-bottom: 4px; }
        
        @keyframes scanline { from { opacity: 0.5; } to { opacity: 1; } }
        .floating-text { position: fixed; pointer-events: none; color: var(--gold); font-weight: bold; animation: fly 0.6s forwards; z-index: 1000; }
        @keyframes fly { to { transform: translateY(-80px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="boot-screen"></div>

    <div class="top-panel">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="width:35px; height:35px; background:var(--gold); border-radius:50%; border:2px solid var(--neon-blue);"></div>
            <div>
                <div style="font-size:0.6rem; color:#888;">LVL 1 OPERATOR</div>
                <div class="hp-counter" id="hp-display">⚡ 0.00 HP/H</div>
            </div>
        </div>
        <div style="text-align:right">
            <div style="font-size:0.5rem;">VAULT (LC)</div>
            <div id="top-bal" style="color:var(--gold); font-family:'Orbitron'; font-size:1.1rem;">0.000</div>
        </div>
    </div>

    <div id="scr-main" class="screen active-screen">
        <div style="text-align:center; margin-bottom:15px;">
            <div style="font-size:0.6rem; letter-spacing:2px; color:#888;">KLYN BALANCE</div>
            <div class="bal-val" id="klyn-bal">0</div>
        </div>
        <div class="lumis-core" id="tap-target"></div>
        <div style="width:80%; margin: 15px auto;">
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:5px;">
                <span>ENERGY</span><span id="energy-text">1000/1000</span>
            </div>
            <div style="height:8px; background:#222; border-radius:4px; border:1px solid var(--neon-blue); overflow:hidden;">
                <div id="energy-fill" style="width:100%; height:100%; background:var(--neon-blue);"></div>
            </div>
        </div>
    </div>

    <div id="scr-earn" class="screen">
        <h3 style="color:var(--neon-blue); font-family:'Orbitron'; font-size:1rem;">REFERRAL LINK</h3>
        <div class="cyber-card" style="border-color:var(--gold);">
            <div style="font-size:0.7rem; color:#ccc;">Invite & Earn 10% from friends</div>
            <button class="btn-cyber" onclick="copyRef()">COPY LINK</button>
        </div>
        <h3 style="color:var(--neon-blue); font-family:'Orbitron'; font-size:1rem; margin-top:20px;">SYSTEM TASKS</h3>
        <div id="links-container"></div>
    </div>

    <div id="scr-nodes" class="screen">
        <h3 style="color:var(--neon-blue); font-family:'Orbitron'; font-size:1rem;">MINING NODES</h3>
        <div id="farms-container"></div>
    </div>

    <div id="scr-wallet" class="screen">
        <h3 style="color:var(--neon-blue); font-family:'Orbitron'; font-size:1rem;">CRYPTO VAULT</h3>
        <button class="btn-cyber" id="wallet-connect" style="width:100%; padding:15px; margin-bottom:20px;" onclick="connectWallet()">CONNECT WALLET</button>
        
        <div class="cyber-card" style="flex-direction:column; align-items:flex-start; gap:10px;">
            <div style="font-size:0.6rem;">EXCHANGE KLYN → LUMIS</div>
            <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                <span id="swap-klyn-val" style="color:var(--neon-blue); font-size:1.2rem; font-family:'Orbitron'">0</span>
                <button class="btn-cyber" onclick="swapKlyn()">CONVERT (10k:1)</button>
            </div>
        </div>

        <div class="cyber-card" style="border-color:var(--gold); margin-top:10px;">
            <div><div style="font-size:0.6rem;">LUMISCOIN (LC)</div><div class="bal-val" id="lumis-bal" style="font-size:1.5rem;">0.000</div></div>
            <div style="text-align:right;"><span style="color:var(--green); font-size:0.6rem;">● LIVE ACCUMULATION</span></div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="nav('scr-main', this)"><i>🏠</i>CORE</div>
        <div class="nav-item" onclick="nav('scr-earn', this)"><i>📡</i>EARN</div>
        <div class="nav-item" onclick="nav('scr-nodes', this)"><i>⚡</i>NODES</div>
        <div class="nav-item" onclick="nav('scr-wallet', this)"><i>👛</i>VAULT</div>
    </nav>

    <script>
        let state = {
            klyn: parseFloat(localStorage.getItem('L_KLYN')) || 0,
            lumis: parseFloat(localStorage.getItem('L_LUMIS')) || 0,
            hp: parseFloat(localStorage.getItem('L_HP')) || 0,
            en: parseFloat(localStorage.getItem('L_EN')) || 1000,
            maxEn: 1000,
            wallet: localStorage.getItem('L_WALT') || null
        };

        const boot = document.getElementById('boot-screen');
        ["INITIALIZING...","LINKING BINANCE...","LINKING KUCOIN...","READY."].forEach((t, i) => {
            setTimeout(() => { boot.innerHTML += `<p>> ${t}</p>`; if(i===3) setTimeout(()=>boot.style.display='none', 800); }, i*400);
        });

        function updateUI() {
            document.getElementById('klyn-bal').innerText = Math.floor(state.klyn).toLocaleString();
            document.getElementById('swap-klyn-val').innerText = Math.floor(state.klyn).toLocaleString();
            document.getElementById('lumis-bal').innerText = state.lumis.toFixed(3);
            document.getElementById('top-bal').innerText = state.lumis.toFixed(3);
            document.getElementById('hp-display').innerText = `⚡ ${state.hp.toFixed(2)} HP/H`;
            document.getElementById('energy-fill').style.width = (state.en / state.maxEn * 100) + '%';
            document.getElementById('energy-text').innerText = `${Math.floor(state.en)}/${state.maxEn}`;
            if(state.wallet) document.getElementById('wallet-connect').innerText = "CONNECTED: " + state.wallet.substring(0,6) + "...";
            
            localStorage.setItem('L_KLYN', state.klyn);
            localStorage.setItem('L_LUMIS', state.lumis);
            localStorage.setItem('L_HP', state.hp);
            localStorage.setItem('L_EN', state.en);
        }

        document.getElementById('tap-target').addEventListener('pointerdown', (e) => {
            if(state.en >= 1) { state.klyn += 1; state.en -= 1; updateUI(); pop(e.clientX, e.clientY); }
        });

        function pop(x,y) {
            const p = document.createElement('div'); p.className='floating-text'; p.innerText='+1'; p.style.left=x+'px'; p.style.top=y+'px';
            document.body.appendChild(p); setTimeout(()=>p.remove(), 600);
        }

        function swapKlyn() {
            if(state.klyn >= 100) {
                let gained = state.klyn / 10000;
                state.lumis += gained; state.klyn = 0;
                alert("CONVERTED! +" + gained.toFixed(3) + " LC"); updateUI();
            }
        }

        function connectWallet() {
            const addr = "0x" + Math.random().toString(16).slice(2,10);
            state.wallet = addr; localStorage.setItem('L_WALT', addr); updateUI();
            alert("Wallet Connected Successfully!");
        }

        function copyRef() {
            const link = "https://t.me/YourBotName?start=" + (state.wallet || "user482910");
            navigator.clipboard.writeText(link); alert("Referral link copied!");
        }

        function nav(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen'); el.classList.add('active');
            if(id==='scr-earn' || id==='scr-nodes') loadData();
        }

        async function loadData() {
            const res = await fetch('data.json'); const d = await res.json();
            const lCont = document.getElementById('links-container'); lCont.innerHTML = '';
            d.links.forEach(l => {
                lCont.innerHTML += `<div class="cyber-card"><div><b>${l.icon} ${l.name}</b><br><span style="color:var(--green);font-size:0.6rem;">+${l.reward} KLYN</span></div><button class="btn-cyber" onclick="window.open('${l.url}','_blank')">OPEN</button></div>`;
            });
            const fCont = document.getElementById('farms-container'); fCont.innerHTML = '';
            d.farms.forEach(f => {
                const can = state.lumis >= f.cost;
                fCont.innerHTML += `<div class="cyber-card"><div><b>${f.icon} ${f.name}</b><br><span style="color:var(--neon-blue);font-size:0.6rem;">+${f.income} HP/H</span></div><button class="btn-cyber" ${can?'':'style="opacity:0.3"'} onclick="buyNode(${f.cost}, ${f.income})">${f.cost.toFixed(3)} LC</button></div>`;
            });
        }

        function buyNode(c, i) { if(state.lumis >= c) { state.lumis -= c; state.hp += i; updateUI(); loadData(); } }

        setInterval(() => {
            if(state.hp > 0) state.lumis += (state.hp / 3600);
            if(state.en < state.maxEn) state.en += 1; updateUI();
        }, 1000);

        updateUI();
    </script>
</body>
</html>
