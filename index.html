<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumis Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon: #00f2ff;
            --gold: #ffcc00;
            --dark: #050505;
        }
        body { 
            font-family: sans-serif; background: var(--dark); color: white; 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* Header */
        .header { padding: 15px; background: #000; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; }
        .stats div { font-size: 14px; font-weight: bold; }

        /* Navigation */
        .nav { display: flex; background: #000; border-top: 1px solid #222; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: #555; cursor: pointer; }
        .nav-item.active { color: var(--neon); }

        /* Pages */
        .page { display: none; flex: 1; padding: 20px; flex-direction: column; align-items: center; overflow-y: auto; }
        .page.active { display: flex; }

        /* Clicker Image */
        .chamber {
            width: 240px; height: 320px; border: 2px solid var(--neon); border-radius: 120px 120px 20px 20px;
            overflow: hidden; position: relative; margin: 20px 0; background: #111;
        }
        #lumis-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Buttons */
        .btn { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon); 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 80%; margin: 10px 0;
        }
        .btn-gold { border-color: var(--gold); color: var(--gold); }

        /* Floating +1 */
        .tap-anim { position: absolute; color: var(--neon); font-weight: bold; animation: fly 0.6s forwards; pointer-events: none; }
        @keyframes fly { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats">
            <div style="color:var(--neon)" id="l-val">0.00 L</div>
            <div style="color:var(--gold)" id="k-val">0 KLYN</div>
        </div>
        <div style="font-size:10px">ID: LUMIS_HERO</div>
    </div>

    <div id="p-game" class="page active">
        <div class="chamber" onclick="doTap(event)">
            <img src="lumis.jpg" id="lumis-img" onerror="this.src='https://via.placeholder.com/240x320?text=Lumis+Image'">
        </div>
        <div id="rate-display" style="color:#888; margin-bottom: 10px;">Дохід: +1/с</div>
        <button class="btn btn-gold" onclick="doSync()">СИНТЕЗУВАТИ (1000 KLYN)</button>
    </div>

    <div id="p-farms" class="page">
        <h2>ФЕРМИ</h2>
        <div style="width:100%; border:1px solid #333; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <span>Нейро-мережа (+1/с)</span>
            <button class="btn" style="width:auto" onclick="buyFarm(0.5, 1)">0.5 L</button>
        </div>
    </div>

    <div id="p-shop" class="page">
        <h2>МАГАЗИН</h2>
        <p>Операції з USDT та Lumis Coin</p>
        <button class="btn">ПОПОВНИТИ USDT</button>
    </div>

    <div id="p-acc" class="page">
        <h2>ПРОФІЛЬ</h2>
        <div style="text-align:left; width:100%">
            <p>KLYN: <span id="acc-k">0</span></p>
            <p>LUMIS: <span id="acc-l">0.00</span></p>
        </div>
        <button class="btn" style="background:var(--neon); color:black">ГАМАНЕЦЬ</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="go('p-game', this)">🎮 ГРАТИ</div>
        <div class="nav-item" onclick="go('p-farms', this)">⛏ МАЙНІНГ</div>
        <div class="nav-item" onclick="go('p-shop', this)">🛒 МАГАЗИН</div>
        <div class="nav-item" onclick="go('p-acc', this)">📊 ПРОФІЛЬ</div>
    </div>

    <script>
        let k = parseFloat(localStorage.getItem('k')) || 0;
        let l = parseFloat(localStorage.getItem('l')) || 0;
        let r = parseInt(localStorage.getItem('r')) || 1;

        function refresh() {
            document.getElementById('k-val').innerText = Math.floor(k) + " KLYN";
            document.getElementById('l-val').innerText = l.toFixed(2) + " L";
            document.getElementById('acc-k').innerText = Math.floor(k);
            document.getElementById('acc-l').innerText = l.toFixed(2);
            document.getElementById('rate-display').innerText = "Дохід: +" + r + "/с";
            
            localStorage.setItem('k', k);
            localStorage.setItem('l', l);
            localStorage.setItem('r', r);
        }

        function doTap(e) {
            k += 1;
            let d = document.createElement('div');
            d.className = 'tap-anim';
            d.innerText = '+1';
            d.style.left = e.clientX + 'px';
            d.style.top = e.clientY + 'px';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 600);
            refresh();
        }

        function doSync() {
            if (k >= 1000) { k -= 1000; l += 0.1; refresh(); }
        }

        function buyFarm(cost, add) {
            if (l >= cost) { l -= cost; r += add; refresh(); }
        }

        function go(id, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        setInterval(() => { k += r; refresh(); }, 1000);
        refresh();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
