<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumisCoin Alpha</title>
    <style>
        :root {
            --binance-gold: #f3ba2f;
            --klyn-green: #00ff88;
            --bg-dark: #0b0e11;
            --card-bg: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Головний екран */
        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .balance-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .balance-card h2 {
            margin: 0;
            font-size: 0.9rem;
            color: #aaa;
            text-transform: uppercase;
        }

        #balance {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--binance-gold);
            text-shadow: 0 0 15px rgba(243, 186, 47, 0.3);
        }

        /* Велика Кнопка */
        .main-tap-area {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #f3ba2f 0%, #d4a017 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(243, 186, 47, 0.4);
            transition: transform 0.1s;
            user-select: none;
            border: 8px solid rgba(255,255,255,0.1);
        }

        .main-tap-area:active {
            transform: scale(0.92);
        }

        /* Секції (Завдання, Ферми і т.д.) */
        .page-content {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 70px);
            background: var(--bg-dark);
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .active-page { display: block; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        /* Картки Завдань */
        .quest-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--binance-gold);
        }

        .quest-info h3 { margin: 0; font-size: 1rem; color: var(--binance-gold); }
        .quest-info p { margin: 5px 0; font-size: 0.8rem; color: #ccc; }
        .reward-badge { color: var(--klyn-green); font-weight: bold; font-size: 0.9rem; }

        .btn-action {
            background: var(--binance-gold);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Навігація */
        .nav-bar {
            height: 70px;
            background: rgba(11, 14, 17, 0.95);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7rem;
            color: #888;
            cursor: pointer;
        }

        .nav-item.active { color: var(--binance-gold); }
        .nav-item span { font-size: 1.4rem; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="balance-card">
            <h2>Твій баланс</h2>
            <div id="balance">1000</div>
            <div style="font-size: 0.8rem; color: var(--klyn-green);">KLYN Tokens</div>
        </div>
        
        <div class="main-tap-area" onclick="tapMe()">🟡</div>
        <p style="margin-top: 20px; color: #666;">Тайпай, щоб заробляти</p>
    </div>

    <div id="quests-page" class="page-content">
        <h1 style="text-align: center;">Завдання</h1>
        
        <div class="quest-card">
            <div class="quest-info">
                <h3>Приєднатися до Telegram</h3>
                <p>Будь у курсі всіх новин проекту</p>
                <div class="reward-badge">+2000 KLYN</div>
            </div>
            <button class="btn-action" onclick="window.open('https://t.me/ТВОЯ_ГРУПА', '_blank')">Йти</button>
        </div>

        <div id="dynamic-quests"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('main')"><span>🏠</span>Головна</div>
        <div class="nav-item" onclick="showPage('quests')"><span>📜</span>Завдання</div>
        <div class="nav-item" onclick="alert('Скоро!')"><span>🚜</span>Ферми</div>
        <div class="nav-item" onclick="alert('Твоє посилання: ...')"><span>👥</span>Друзі</div>
    </div>

    <script>
        let balance = 1000;

        function tapMe() {
            balance += 1;
            document.getElementById('balance').innerText = balance;
        }

        function showPage(page) {
            // Приховуємо всі сторінки
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active-page'));
            
            if (page === 'quests') {
                document.getElementById('quests-page').classList.add('active-page');
                loadQuests(); // Завантажуємо дані з JSON при відкритті
            }
        }

        async function loadQuests() {
            const container = document.getElementById('dynamic-quests');
            container.innerHTML = '<p style="text-align:center">Завантаження партнерських програм...</p>';

            try {
                // Міняємо на пряме посилання на твій файл на GitHub
                const response = await fetch('data.json'); 
                const data = await response.json();
                
                container.innerHTML = ''; // Очищуємо текст завантаження

                data.quests.forEach(q => {
                    const card = document.createElement('div');
                    card.className = 'quest-card';
                    card.innerHTML = `
                        <div class="quest-info">
                            <h3>${q.title}</h3>
                            <p>${q.description}</p>
                            <div class="reward-badge">+${q.reward} KLYN</div>
                        </div>
                        <button class="btn-action" onclick="window.open('${q.link}', '_blank')">${q.button_text}</button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = '<p style="color:red">Помилка завантаження партнерських завдань.</p>';
            }
        }
    </script>
</body>
</html>
