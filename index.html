<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumis Universe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --ai-purple: #bc00ff;
            --klyn-gold: #ffcc00;
            --bg-dark: #050505;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-dark); 
            color: white; margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* Верхня частина з балансом */
        .header {
            padding: 15px; background: #000;
            border-bottom: 1px solid var(--neon-blue);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .balance-info div { font-weight: bold; }
        #l-bal { color: var(--neon-blue); font-size: 20px; }
        #k-bal { color: var(--klyn-gold); font-size: 14px; }

        /* Контейнер сторінок */
        .main-content { flex: 1; position: relative; overflow-y: auto; display: flex; flex-direction: column; }
        .page { display: none; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; }
        .active-page { display: flex; }

        /* Екран клікера (Синтез) */
        .coin-container {
            width: 280px; height: 280px; margin: 40px 0;
            position: relative; cursor: pointer; transition: transform 0.05s;
        }
        .coin-container:active { transform: scale(0.92); }
        #coin-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.3)); }

        /* Картки для завдань/майнінгу */
        .card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid #222;
            border-radius: 15px; width: 95%; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-action {
            background: var(--neon-blue); color: black; border: none;
            padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* Нижня навігація */
        .nav-bar {
            background: #000; border-top: 1px solid #222;
            display: flex; padding: 10px 0 25px 0; /* padding знизу для iPhone */
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            color: #555; font-size: 11px; cursor: pointer; transition: 0.3s;
        }
        .nav-item.active { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        /* Ефект вильоту +1 */
        .tap-effect {
            position: absolute; color: var(--neon-blue); font-weight: bold;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards;
        }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-info">
            <div id="l-bal">0.00 L</div>
            <div id="k-bal">0 KLYN</div>
        </div>
        <div style="font-size: 10px; color: #444;">ID: <span id="uid">USER_01</span></div>
    </div>

    <div class="main-content">
        <div id="p-home" class="page active-page">
            <div class="coin-container" onclick="handleTap(event)">
                <img src="lumis_coin.png" id="coin-img" onerror="this.src='https://via.placeholder.com/280?text=LumisCoin'">
            </div>
            <p style="color: #666; font-style: italic;">Торкніться монети для генерації енергії</p>
            <button class="btn-action" style="width: 80%; background: none; border: 1px solid var(--klyn-gold); color: var(--klyn-gold); margin-top: 20px;" onclick="convert()">
                КОНВЕРТУВАТИ (1000 KLYN ➔ 0.1 L)
            </button>
        </div>

        <div id="p-farm" class="page">
            <h2 style="color: var(--neon-blue);">ПАВИННИЙ ВИДОБУТОК</h2>
            <div class="card">
                <div><strong>Нейронна мережа</strong><br><small>+1 KLYN/сек</small></div>
                <button class="btn-action" onclick="upgrade(0.5, 1)">0.5 L</button>
            </div>
            <div class="card">
                <div><strong>AI Сервер</strong><br><small>+5 KLYN/сек</small></div>
                <button class="btn-action" onclick="upgrade(2.0, 5)">2.0 L</button>
            </div>
        </div>

        <div id="p-tasks" class="page">
            <h2 style="color: var(--neon-blue);">QUESTS</h2>
            <div class="card">
                <div>Підписка на канал<br><small>+500 KLYN</small></div>
                <button class="btn-action">GO</button>
            </div>
        </div>

        <div id="p-profile" class="page">
            <h2 style="color: var(--neon-blue);">МІЙ ГАМАНЕЦЬ</h2>
            <div class="card" style="flex-direction: column; align-items: flex-start;">
                <p>Lumis Balance: <span style="color: var(--neon-blue)">0.00</span></p>
                <p>Energy Power: <span style="color: var(--klyn-gold)">1/tap</span></p>
            </div>
            <button class="btn-action" style="width: 100%; padding: 15px; margin-top: 20px;" onclick="alert('Скоро...')">CONNECT WALLET</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchPage('p-home', this)">
            <span class="nav-icon">🎮</span>
            <span>СИНТЕЗ</span>
        </div>
        <div class="nav-item" onclick="switchPage('p-farm', this)">
            <span class="nav-icon">⛏</span>
            <span>МАЙНІНГ</span>
        </div>
        <div class="nav-item" onclick="switchPage('p-tasks', this)">
            <span class="nav-icon">📋</span>
            <span>ЗАВДАННЯ</span>
        </div>
        <div class="nav-item" onclick="switchPage('p-profile', this)">
            <span class="nav-icon">👤</span>
            <span>ПРОФІЛЬ</span>
        </div>
    </div>

    <script>
        let klyn = parseFloat(localStorage.getItem('k_v5')) || 0;
        let lumis = parseFloat(localStorage.getItem('l_v5')) || 0;
        let rate = parseInt(localStorage.getItem('r_v5')) || 0;

        function updateUI() {
            document.getElementById('k-bal').innerText = Math.floor(klyn) + " KLYN";
            document.getElementById('l-bal').innerText = lumis.toFixed(2) + " L";
            localStorage.setItem('k_v5', klyn);
            localStorage.setItem('l_v5', lumis);
            localStorage.setItem('r_v5', rate);
        }

        function handleTap(e) {
            klyn += 1;
            // Анімація вильоту +1
            const p = document.createElement('div');
            p.className = 'tap-effect';
            p.innerText = '+1';
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            updateUI();
        }

        function switchPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active-page');
            el.classList.add('active');
        }

        function convert() {
            if (klyn >= 1000) { klyn -= 1000; lumis += 0.1; updateUI(); }
            else { alert("Потрібно 1000 KLYN"); }
        }

        function upgrade(cost, add) {
            if (lumis >= cost) { lumis -= cost; rate += add; updateUI(); }
            else { alert("Недостатньо Lumis"); }
        }

        // Авто-майнінг
        setInterval(() => { if(rate > 0) { klyn += rate; updateUI(); } }, 1000);

        updateUI();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
