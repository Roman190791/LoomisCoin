<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumis Ecosystem</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --dark: #050505; --card: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        .header { padding: 15px; background: #000; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        #top-l { color: var(--neon); font-size: 18px; font-weight: bold; }
        #top-k { color: var(--gold); font-size: 13px; }

        .content { flex: 1; position: relative; display: flex; overflow-y: auto; }
        .page { display: none; flex: 1; padding: 20px; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .active-page { display: flex; }

        /* ADVANCED SVG COIN */
        .coin-wrapper { margin: 30px 0; cursor: pointer; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .coin-wrapper:active { transform: scale(0.92); }

        /* UI ELEMENTS */
        .card { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 12px; width: 100%; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .btn-main { background: none; border: 2px solid var(--gold); color: var(--gold); width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-small { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; text-decoration: none; }

        /* NAVIGATION */
        .nav { display: flex; background: #000; border-top: 1px solid #222; padding: 10px 0 25px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 9px; color: #444; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--neon); }
        .nav-icon { font-size: 18px; display: block; margin-bottom: 2px; }

        /* LEADERBOARD STYLES */
        .rank-item { display: flex; align-items: center; width: 100%; padding: 10px; border-bottom: 1px solid #222; }
        .rank-num { width: 30px; color: var(--gold); font-weight: bold; }
        .rank-name { flex: 1; margin-left: 10px; }

        .tap-text { position: absolute; color: var(--neon); font-weight: bold; pointer-events: none; animation: fly 0.6s forwards; z-index: 100; }
        @keyframes fly { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats">
            <b id="top-l">0.00 LUMIS</b>
            <b id="top-k">0 KLYN</b>
        </div>
        <div style="text-align: right; color: var(--neon); font-size: 10px;">CORE PROTOCOL<br>ACTIVE</div>
    </div>

    <div class="content">
        <div id="p-mining" class="page active-page">
            <div class="coin-wrapper" onclick="handleTap(event)">
                <svg width="240" height="240" viewBox="0 0 200 200">
                    <defs>
                        <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" style="stop-color:#ffeb3b;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#f57f17;stop-opacity:1" />
                        </radialGradient>
                    </defs>
                    <circle cx="100" cy="100" r="95" fill="url(#goldGrad)" stroke="#ffcc00" stroke-width="4"/>
                    <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
                    <path id="circlePath" d="M 100, 100 m -70, 0 a 70,70 0 1,1 140,0 a 70,70 0 1,1 -140,0" fill="none"/>
                    <text font-size="12" fill="#333" font-weight="bold">
                        <textPath xlink:href="#circlePath">LUMIS COIN • DIGITAL ASSET • LUMIS COIN • </textPath>
                    </text>
                    <g transform="translate(65, 60) scale(0.15)" fill="#222">
                        <path d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256 256-114.6 256-256S397.4 0 256 0zm0 464c-114.7 0-208-93.3-208-208S141.3 48 256 48s208 93.3 208 208-93.3 208-208 208z"/>
                        <path d="M352 192h-48v-32c0-8.8-7.2-16-16-16h-64c-8.8 0-16 7.2-16 16v32h-48c-17.7 0-32 14.3-32 32v128c0 17.7 14.3 32 32 32h192c17.7 0 32-14.3 32-32V224c0-17.7-14.3-32-32-32zm-80 128h-32v-32h32v32z"/>
                    </g>
                    <text x="100" y="165" text-anchor="middle" font-size="14" fill="#000" font-weight="bold" font-family="Arial">LUMIS</text>
                </svg>
            </div>
            <button class="btn-main" onclick="sync()">СИНТЕЗ (1000 KLYN ➔ 0.1 L)</button>
        </div>

        <div id="p-tasks" class="page">
            <h2 style="color:var(--neon)">ЗАВДАННЯ</h2>
            <div id="tasks-list" style="width:100%"></div>
        </div>

        <div id="p-leader" class="page">
            <h2 style="color:var(--gold)">TOP PLAYERS</h2>
            <div class="rank-item"><span class="rank-num">1</span><span class="rank-name">Cyber_Lumis</span><span>1420 L</span></div>
            <div class="rank-item"><span class="rank-num">2</span><span class="rank-name">Alex_AI</span><span>980 L</span></div>
            <div class="rank-item"><span class="rank-num">3</span><span class="rank-name">User_771</span><span>540 L</span></div>
            <div style="margin-top:20px; color:#555">Твій ранг: #402</div>
        </div>

        <div id="p-wallet" class="page">
            <h2 style="color:var(--neon)">ГАМАНЕЦЬ</h2>
            <div class="card" style="flex-direction: column; align-items: flex-start;">
                <span style="color:#666">Твій баланс:</span>
                <span style="font-size: 28px; color: var(--gold); margin: 10px 0;" id="w-l">0.00 L</span>
                <span style="color:var(--neon)" id="w-usdt">≈ 0.00 USDT</span>
            </div>
            <button class="btn-main" style="background:var(--gold); color:black">WITHDRAW</button>
        </div>

        <div id="p-acc" class="page">
            <h2 style="color:var(--neon)">ПРОФІЛЬ</h2>
            <div class="card"><span>ID:</span><span id="u-id">#55012</span></div>
            <div class="card"><span>Статус:</span><span style="color:var(--neon)">Майнер (Hybrid)</span></div>
            <div class="card"><span>Швидкість:</span><span id="p-r">+0/s</span></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="tab('p-tasks', this)"><span class="nav-icon">📋</span>ЗАВДАННЯ</div>
        <div class="nav-item" onclick="tab('p-leader', this)"><span class="nav-icon">🏆</span>ЛІДЕРБОРД</div>
        <div class="nav-item active" onclick="tab('p-mining', this)"><span class="nav-icon">⛏</span>МАЙНІНГ</div>
        <div class="nav-item" onclick="tab('p-wallet', this)"><span class="nav-icon">👛</span>ГАМАНЕЦЬ</div>
        <div class="nav-item" onclick="tab('p-acc', this)"><span class="nav-icon">👤</span>ПРОФІЛЬ</div>
    </div>

    <script>
        let k = parseFloat(localStorage.getItem('lm_k_v10')) || 0;
        let l = parseFloat(localStorage.getItem('lm_l_v10')) || 0;
        let r = parseInt(localStorage.getItem('lm_r_v10')) || 0;

        async function loadData() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                const tL = document.getElementById('tasks-list'); tL.innerHTML = '';
                data.tasks.forEach(t => {
                    tL.innerHTML += `<div class="card"><div><b>${t.name}</b><br><small>+${t.reward} KLYN</small></div><a href="${t.url}" target="_blank" class="btn-small">GO</a></div>`;
                });
            } catch (e) { console.log("JSON Error"); }
        }

        function refresh() {
            document.getElementById('top-k').innerText = Math.floor(k) + " KLYN";
            document.getElementById('top-l').innerText = l.toFixed(2) + " LUMIS";
            document.getElementById('w-l').innerText = l.toFixed(2) + " L";
            document.getElementById('w-usdt').innerText = "≈ " + (l * 0.55).toFixed(2) + " USDT";
            document.getElementById('p-r').innerText = "+" + r + "/s";
            localStorage.setItem('lm_k_v10', k);
            localStorage.setItem('lm_l_v10', l);
            localStorage.setItem('lm_r_v10', r);
        }

        function handleTap(e) {
            k += 1;
            const d = document.createElement('div');
            d.className = 'tap-text'; d.innerText = '+1';
            d.style.left = e.clientX + 'px'; d.style.top = e.clientY + 'px';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 600);
            refresh();
        }

        function sync() { if(k >= 1000) { k -= 1000; l += 0.1; refresh(); } else { alert("Мало KLYN!"); } }

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            el.classList.add('active');
        }

        setInterval(() => { if(r > 0) { k += r; refresh(); } }, 1000);
        loadData(); refresh();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
